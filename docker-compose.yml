# ============================================================
# SeedCycle — Docker Compose (IaaS Layer)
# Orchestrates: MongoDB + Express API + React Frontend
# Run: docker compose up -d --build
# ============================================================

services:
  # ── MongoDB Database ─────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: seedcycle-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - seedcycle-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API Server ───────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: seedcycle-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/seedcycle
      - JWT_SECRET=${JWT_SECRET:-seedcycle_docker_secret_2025}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      # Cloudinary (Feature 3)
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      # OpenWeatherMap (Feature 4)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - seedcycle-net

  # ── React Frontend (Nginx) ──────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: seedcycle-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - seedcycle-net

# ── Persistent Volumes ────────────────────────────────────
volumes:
  mongo-data:
    driver: local
  uploads-data:
    driver: local

# ── Internal Network ──────────────────────────────────────
networks:
  seedcycle-net:
    driver: bridge
